name: Process scheduled & auto posts

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  process-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Debug secrets presence
        run: |
          if [ -z "${{ secrets.PRNIT_SITE_URL }}" ]; then
            echo "::error::PRNIT_SITE_URL secret is MISSING!"
            exit 1
          fi
          if [ -z "${{ secrets.PRNIT_CRON_SECRET }}" ]; then
            echo "::error::PRNIT_CRON_SECRET secret is MISSING!"
            exit 1
          fi
          echo "Secrets present ✓"

      - name: Call Prnit cron endpoint
        env:
          SITE_URL: ${{ secrets.PRNIT_SITE_URL }}
          CRON_SECRET: ${{ secrets.PRNIT_CRON_SECRET }}
        run: |
          BASE="${SITE_URL%/}"
          RESPONSE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE}/api/cron/process-scheduled")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.txt
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Cron endpoint returned HTTP $RESPONSE"
            exit 1
          fi